services:
  # Service Backend (NestJS)
  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile.backend
      # dockerfile: ./../../Dockerfile.backend
    ports:
      - "3000:3000"
    volumes:
      - ../../backend:/backend
      - backend_node_modules:/backend/node_modules
    env_file:
      - ../../backend/.env
    environment:
      NODE_ENV: development
    #   DATABASE_HOST: postgres
    #   DATABASE_PORT: 5432
    #   DATABASE_USER: user
    #   DATABASE_PASSWORD: password
    #   DATABASE_NAME: psql_archi_db
    #   MONGO_URI: mongodb://mongo:27017/mg_archi_db
    depends_on:
      - postgres
      - mongo

  # Service Frontend (React.js)
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../docker/dev/Dockerfile.frontend
    ports:
      - "3001:3001"
    volumes:
      - ../../frontend:/frontend
#      - ../../frontend/node_modules:/frontend/node_modules
    environment:
      NODE_ENV: development
      PORT: 3001
    depends_on:
      - backend

  # Service PostgreSQL
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psql_archi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Service MongoDB
  mongo:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mg_archi_db

volumes:
  backend_node_modules: {}
  postgres_data: {}
  mongo_data: {}