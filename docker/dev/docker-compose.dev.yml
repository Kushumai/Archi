services:
  # Service Backend (NestJS)
  backend:
    build:
      context: /Users/clementassurly/development/Archi/backend
      dockerfile: /Users/clementassurly/development/Archi/docker/dev/Dockerfile.backend
      # dockerfile: ./../../Dockerfile.backend
    ports:
      - "3000:3000"
    volumes:
      - /Users/clementassurly/development/Archi/backend:/backend
      - /Users/clementassurly/development/Archi/backend/node_modules:/backend/node_modules
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: user
      DATABASE_PASSWORD: password
      DATABASE_NAME: dev_db
      MONGO_URI: mongodb://mongo:27017/dev_db
    depends_on:
      - postgres
      - mongo

  # Service Frontend (React.js)
  frontend:
    build:
      context: /Users/clementassurly/development/Archi/frontend
      dockerfile: /Users/clementassurly/development/Archi/docker/dev/Dockerfile.frontend
    ports:
      - "3001:3001"
    volumes:
      - /Users/clementassurly/development/Archi/frontend:/frontend
      - /Users/clementassurly/development/Archi/frontend/node_modules:/frontend/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      - backend

  # Service PostgreSQL
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Service MongoDB
  mongo:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dev_db

volumes:
  postgres_data: {}
  mongo_data: {}