


services:
  # Service Backend (NestJS)
  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/dev/Dockerfile.backend
    ports:
      - "3000:3000"
    volumes:
      - ../../backend:/backend
      - backend_node_modules:/backend/node_modules
    env_file:
      - ../../backend/.env
    environment:
      NODE_ENV: development
    depends_on:
      - postgres
      - mongo
    networks:
    - dev_net
    container_name: archi_backend_dev

  # Service Frontend (React.js)
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../docker/dev/Dockerfile.frontend
    ports:
      - "3001:3001"
    volumes:
      - ../../frontend:/frontend
#      - frontend/node_modules:/frontend/node_modules
    environment:
      NODE_ENV: development
      PORT: 3001
    depends_on:
      - backend
    networks:
    - dev_net
    container_name: archi_frontend_dev

  # Service PostgreSQL
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psql_archi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
    - dev_net
    container_name: archi_postgres_dev

  # Service MongoDB
  mongo:
    image: mongo:5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mg_archi_db
    networks:
    - dev_net
    container_name: archi_mongo_dev

volumes:
  backend_node_modules: {}
  postgres_data: {}
  mongo_data: {}